<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <title>Game Recommendation Engine</title>
    <style>
        :root { --bg-color: #0d0d0d; --text-color: #ffffff; --neon-blue: #00ffcc; --neon-pink: #ff00ff; --neon-purple: #9d00ff; }
        body { background-color: var(--bg-color); color: var(--text-color); font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; }
        h1, h2, h3 { text-align: center; text-shadow: 0 0 5px var(--neon-blue); }
        .container { max-width: 800px; margin: auto; background: rgba(255, 255, 255, 0.05); padding: 30px; border-radius: 15px; box-shadow: 0 0 15px var(--neon-purple); border: 1px solid var(--neon-purple); }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 5px; color: var(--neon-blue); }
        input, select { width: 100%; padding: 10px; background: #1a1a1a; border: 1px solid var(--neon-blue); color: #fff; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: transparent; border: 2px solid var(--neon-pink); color: var(--neon-pink); font-size: 18px; border-radius: 5px; cursor: pointer; transition: 0.3s; }
        button:hover { background: var(--neon-pink); color: #fff; box-shadow: 0 0 20px var(--neon-pink); }
        .card { background: rgba(0, 0, 0, 0.6); border: 1px solid var(--neon-blue); border-radius: 10px; padding: 15px; margin-bottom: 20px; display: flex; gap: 15px; }
        .card-info { flex-grow: 1; }
        .badge { display: inline-block; padding: 5px 10px; background: rgba(255, 0, 255, 0.2); color: var(--neon-pink); border-radius: 20px; font-size: 12px; border: 1px solid var(--neon-pink); }
    </style>
</head>
<body>
    {% block content %}{% endblock %}
</body>
</html>
