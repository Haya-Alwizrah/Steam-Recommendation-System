{% extends "base.html" %}
{% block content %}
<div style="min-height: 75vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center;">
    
    <h1 style="margin-bottom: 10px;">STEAM RECOMMENDATION SYSTEM</h1>
    <p style="color: var(--text-muted); margin-bottom: 40px; font-size: 1.4rem;">Discover similar titles using modern analytics & machine learning</p>

    <form method="POST" style="width: 100%; max-width: 550px; text-align: left;">
        
        <div style="margin-bottom: 25px;">
            <label style="display: block; margin-bottom: 8px; color: var(--neon-cyan); font-size: 1.6rem; font-weight: bold; letter-spacing: 1px;">Name</label>
            <input type="text" name="name" placeholder="Type your name or 'admin'..." required autocomplete="off">
        </div>
        
        <div style="margin-bottom: 35px;">
            <label style="display: block; margin-bottom: 8px; color: var(--neon-cyan); font-size: 1.6rem; font-weight: bold; letter-spacing: 1px;">Age</label>
            <input type="number" name="age" placeholder="Enter your age..." required min="5" max="100">
        </div>

        <button type="submit" style="width: 100%; padding: 15px; font-size: 1.6rem;">ACCESS PORTAL</button>
    </form>
</div>
{% endblock %}
