{% extends "base.html" %}
{% block content %}
<div style="text-align: center; padding: 40px 0;">
    <h1>STEAM RECOMMENDATION SYSTEM</h1>
    <p style="color: var(--text-muted); margin-bottom: 30px;">Discover similar titles using modern analytics & machine learning</p>

    <div class="admin-hint">
        💡 <b>Notice:</b> To view the analytical dashboard, type <span style="color: var(--neon-pink); font-weight: bold;">admin</span> in the field below.
    </div>

    <form method="POST" style="max-width: 400px; margin: 30px auto;">
        <div style="margin-bottom: 20px;">
            <input type="text" name="name" placeholder="Enter your username..." required autocomplete="off" style="text-align: center;">
        </div>
        <button type="submit" style="width: 100%;">ACCESS PORTAL 🚀</button>
    </form>
</div>
{% endblock %}
