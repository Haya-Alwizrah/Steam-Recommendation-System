{% extends "base.html" %}
{% block content %}
<div style="text-align: center; padding: 40px 0;">
    <h1>STEAM RECOMMENDATION SYSTEM</h1>
    <p style="color: var(--text-muted); margin-bottom: 30px;">An Intelligent Game Discovery & Recommendation Engine</p>

    <!-- Admin Hint in English -->
    <div class="admin-hint">
        💡 <b>Tip:</b> To access the analytical panel and charts, type <span style="color: var(--neon-pink); font-weight: bold;">admin</span> in the username field.
    </div>

    <form method="POST" style="max-width: 400px; margin: 30px auto;">
        <div style="margin-bottom: 20px;">
            <input type="text" name="name" placeholder="Enter your username..." required autocomplete="off" style="text-align: center;">
        </div>
        <button type="submit" style="width: 100%;">ACCESS SYSTEM 🚀</button>
    </form>
</div>
{% endblock %}
